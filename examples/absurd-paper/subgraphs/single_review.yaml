name: "Single Review (draft + self-critique)"
version: "0.1.0"

# Per-reviewer subgraph invoked by the parent workflow's `reviewer_pool`
# fan-out. Each Send branch (one per manifest item) runs this graph in
# isolation. Inputs (reviewer_id, name, affiliation, style, focus,
# paper_summary) come from the parent's `template.inputs:` projection
# of the manifest item.
#
# The terminal node (`critique`) is what the parent sees as the
# reviewer's final review — both `node_outputs[reviewer_pool::<id>]`
# (the parent's child_outputs aggregation) and the gate input.
#
# Standalone-runnable: `abe-froman run single_review.yaml` works if
# you pass node_inputs via the runner harness.

nodes:
  - id: draft
    name: "Draft Review"
    prompt_file: "examples/absurd-paper/prompts/reviewer_review.md"

  - id: critique
    name: "Self-Critique Pass"
    prompt_file: "examples/absurd-paper/prompts/critique_review.md"
    depends_on: [draft]
    timeout: 240.0

settings:
  default_model: "sonnet"
  executor: "acp"
  default_timeout: 180.0
  max_parallel_jobs: 1
