name: "Absurd Academic Paper"
version: "0.1.0"

nodes:
  - id: seed_inspiration
    name: "Gather Topic Inspirations"
    execution:
      type: command
      command: python3
      args: ["examples/absurd-paper/scripts/pick_topic.py"]

  - id: choose_topic
    name: "Synthesize Absurd Research Domain"
    prompt_file: "examples/absurd-paper/prompts/choose_topic.md"
    depends_on: [seed_inspiration]
    # LLM gate checks the synthesized topic against the journal's
    # deadpan-absurd brief. Multi-dim scoring rejects tech-industry
    # drift (absurdity) and vague fields (specificity); the feedback
    # string flows into {{_retry_reason}} for the retry attempt.
    evaluation:
      validator: "examples/absurd-paper/gates/choose_topic_eval.md"
      blocking: true
      max_retries: 2
      dimensions:
        - {field: absurdity,           min: 0.7}
        - {field: specificity,         min: 0.7}
        - {field: methodological_hook, min: 0.6}

  - id: abstract
    name: "Write Abstract"
    prompt_file: "examples/absurd-paper/prompts/abstract.md"
    depends_on: [choose_topic]
    evaluation:
      validator: "examples/absurd-paper/gates/abstract_multi_dim.md"
      blocking: false
      max_retries: 1
      dimensions:
        - {field: rigor,     min: 0.7}
        - {field: humor,     min: 0.6}
        - {field: buzzwords, min: 0.5}

  - id: outline
    name: "Section Outline"
    prompt_file: "examples/absurd-paper/prompts/outline.md"
    depends_on: [abstract]
    evaluation:
      validator: "examples/absurd-paper/gates/outline_json.py"
      threshold: 1.0
      blocking: true

  # Natural topology: each body node reads abstract + outline directly;
  # reconcile reads all four sections + abstract. This was BROKEN before
  # the Stage 1 wait-check fix landed (reconcile fired prematurely when
  # abstract's gate routed to it). With that fix in place, the multi-pred
  # join is honored and this shape runs cleanly.
  - id: intro
    name: "Introduction"
    prompt_file: "examples/absurd-paper/prompts/intro.md"
    depends_on: [abstract, outline]

  - id: methods
    name: "Methods"
    prompt_file: "examples/absurd-paper/prompts/methods.md"
    depends_on: [abstract, outline]

  - id: results
    name: "Results"
    prompt_file: "examples/absurd-paper/prompts/results.md"
    depends_on: [abstract, outline]

  - id: discussion
    name: "Discussion"
    prompt_file: "examples/absurd-paper/prompts/discussion.md"
    depends_on: [abstract, outline]

  # Stage 4c recursive subgraph carve: reconcile + persist + structural
  # check are now a multi-step subgraph runnable standalone. Inputs:
  # project the five body-section outputs into the subgraph's
  # `node_inputs` channel so the subgraph never sees the parent's full
  # state. The subgraph's terminal output (submission_check) surfaces
  # at `node_outputs["paper"]` here.
  - id: paper
    name: "Compose & Validate Paper"
    config: "examples/absurd-paper/subgraphs/compose_and_validate.yaml"
    depends_on: [abstract, intro, methods, results, discussion]
    inputs:
      abstract: "{{abstract}}"
      intro: "{{intro}}"
      methods: "{{methods}}"
      results: "{{results}}"
      discussion: "{{discussion}}"

  # Deterministic PDF render via `uv run --script` + PEP 723 inline
  # dependencies (markdown + weasyprint). No project-wide install — uv
  # resolves deps on first invocation and caches them. Journal-ish CSS
  # (2-column serif, small-caps section headers, page numbers).
  - id: render_pdf
    name: "Render Paper to PDF"
    depends_on: [paper]
    execution:
      type: command
      command: uv
      args:
        - "run"
        - "--script"
        - "examples/absurd-paper/scripts/render_pdf.py"
        - "../../output/paper.md"
        - "../../output/paper.pdf"
    output_contract:
      base_directory: "output"
      required_files: ["paper.pdf"]

  # Stage 4c per-child subgraph fan-out: each Send branch (one per
  # reviewer in the manifest) invokes single_review.yaml in isolation.
  # That subgraph is a 2-node draft → self-critique pipeline; the
  # critique node's output becomes each reviewer's final review.
  # template.inputs: projects manifest item fields into the subgraph's
  # node_inputs channel (visible as plain template vars there).
  - id: reviewer_pool
    name: "Reviewer Pool Manifest"
    prompt_file: "examples/absurd-paper/prompts/reviewer_pool.md"
    depends_on: [paper, render_pdf]
    fan_out:
      enabled: true
      template:
        config: "examples/absurd-paper/subgraphs/single_review.yaml"
        inputs:
          reviewer_id: "{{id}}"
          name: "{{name}}"
          affiliation: "{{affiliation}}"
          style: "{{style}}"
          focus: "{{focus}}"
          paper_summary: "{{paper_summary}}"
        evaluation:
          validator: "examples/absurd-paper/gates/review_quality.py"
          threshold: 1.0
          blocking: false
      final_nodes:
        - id: publish_verdict
          name: "Editorial Publication Verdict"
          prompt_file: "examples/absurd-paper/prompts/publish_verdict.md"
          # Editor-in-Chief deserves the top-tier model for tone.
          model: "opus"
          evaluation:
            validator: "examples/absurd-paper/gates/publish_verdict.md"
            blocking: true
            dimensions:
              - {field: tone,      min: 0.7}
              - {field: coherence, min: 0.6}

settings:
  default_model: "sonnet"
  executor: "acp"
  preamble_file: "examples/absurd-paper/preamble.md"
  output_directory: "paper"
  max_retries: 2
  default_timeout: 180.0
  retry_backoff: [5.0, 15.0]
  max_parallel_jobs: 2
  per_model_limits:
    sonnet: 2
    opus: 1
