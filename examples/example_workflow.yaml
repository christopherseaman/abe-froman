name: "CFRA Default Workflow"
version: "1.0.0"

nodes:
  - id: node-0
    name: "Input Validation"
    description: "Validate EARS input files and requirements"
    evaluation:
      validator: "gates/gate-0-input-validator.js"
      threshold: 0.8

    execute:
      url: "gates/gate-0-input-validator.js"
  - id: node-1
    name: "API & Comparative Research"
    description: "Research APIs, competitive analysis, and technical patterns"
    model: "sonnet"
    depends_on: ["node-0"]
    evaluation:
      validator: "gates/gate-1-research-validator.md"
      threshold: 0.95
    output_contract:
      base_directory: "prd/research/"
      required_files: ["api-research.md", "competitive-analysis.md"]
    execute:
      url: "nodes/node-1-research.md"

  - id: node-2
    name: "User Story Generation"
    description: "Component analysis, manifest-driven subcomponent stories, gap filling, summary"
    depends_on: ["node-1"]
    evaluation:
      validator: "gates/gate-2a-component-analysis-validator.js"
      threshold: 0.9
    output_contract:
      base_directory: "prd/user-stories/"
      required_files: ["manifest.json"]
    fan_out:
      enabled: true
      manifest_path: "prd/user-stories/manifest.json"
      template:
        evaluation:
          validator: "gates/gate-2b-subcomponent-validator.md"
          threshold: 0.8
        execute:
          url: "nodes/node-2b-subcomponent-template.md"
      final_nodes:
        - id: gap-analysis
          name: "Gap Analysis & Coverage Enhancement"
          evaluation:
            validator: "gates/gate-2c-gap-analysis-validator.md"
            threshold: 0.85
          execute:
            url: "nodes/node-2c-gap-analysis.md"
        - id: coverage-validation
          name: "Coverage Validation Gate"
          evaluation:
            validator: "gates/gate-2c-coverage-validator.md"
            threshold: 0.9
            blocking: true
        - id: final-summary
          name: "Final User Stories Summary"
          evaluation:
            validator: "gates/gate-2b-final-validator.js"
            threshold: 0.9

          execute:
            url: "nodes/node-2d-final-summary.md"
    execute:
      url: "nodes/node-2a-component-analysis.md"
  - id: node-3-1
    name: "Data Schema Specifications"
    description: "Generate database schema with entities, relationships, and constraints"
    depends_on: ["node-2"]
    execute:
      url: "nodes/node-3-1-data-schema.md"

  - id: node-3-2
    name: "Data In Transit Specifications"
    description: "Generate API contracts, event streams, and integration message formats"
    depends_on: ["node-2"]
    execute:
      url: "nodes/node-3-2-data-in-transit.md"

  - id: node-3-3
    name: "Integration Functions Specifications"
    description: "Generate external system integration functions and workflows"
    depends_on: ["node-2"]
    execute:
      url: "nodes/node-3-3-integration-functions.md"

  - id: node-3-4
    name: "UX Specifications"
    description: "Generate UI component specifications and user experience workflows"
    depends_on: ["node-2"]
    execute:
      url: "nodes/node-3-4-ux-specifications.md"

  - id: node-3-5
    name: "Application States Specifications"
    description: "Generate state machines and workflow management specifications"
    depends_on: ["node-2"]
    execute:
      url: "nodes/node-3-5-application-states.md"

  - id: node-3-6
    name: "Core Functions Specifications"
    description: "Generate business logic and algorithmic function specifications"
    depends_on: ["node-2"]
    execute:
      url: "nodes/node-3-6-core-functions.md"

  - id: node-3-7
    name: "Analytics Specifications"
    description: "Generate analytics, reporting, and business intelligence specifications"
    depends_on: ["node-2"]
    execute:
      url: "nodes/node-3-7-analytics.md"

  - id: node-3-8
    name: "Security Specifications"
    description: "Generate security architecture and compliance specifications"
    depends_on: ["node-2"]
    execute:
      url: "nodes/node-3-8-security.md"

  - id: node-4
    name: "Specification Reconciliation & Gap Analysis"
    description: "Reconcile all domain specs, resolve conflicts, and fill gaps"
    depends_on:
      - node-3-1
      - node-3-2
      - node-3-3
      - node-3-4
      - node-3-5
      - node-3-6
      - node-3-7
      - node-3-8

    execute:
      url: "nodes/node-4-reconciliation.md"
  - id: node-5
    name: "Implementation Strategy & Planning"
    description: "Create technology-agnostic implementation roadmap with epics and tasks"
    depends_on: ["node-4"]
    execute:
      url: "nodes/node-5-implementation-strategy.md"

settings:
  output_directory: "prd"
  max_retries: 3
  default_model: "sonnet"
